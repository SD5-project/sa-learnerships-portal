name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    # 1. Added 'continue-on-error: true' so the pipeline keeps moving if tests fail
    - name: Run Jest tests with Coverage
      id: jest_tests
      continue-on-error: true
      run: npm run test:coverage

    # 2. Added 'if: always()' so Codecov runs no matter what happened in previous steps
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: Swag-png/sa-learnerships-portal
        fail_ci_if_error: true

    # 3. Explicitly fail the job at the very end if the tests actually failed
    - name: Check test status
      if: steps.jest_tests.outcome == 'failure'
      run: |
        echo "❌ Tests failed during the coverage run. Marking job as failed."
        exit 1 