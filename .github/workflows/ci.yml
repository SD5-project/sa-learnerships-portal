name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # ── Mocha: Access Control Tests ──────────────────────────────────────────
      - name: Run Mocha access control tests
        run: npx mocha tests/control-access.test.js --timeout 10000
        env:
          NODE_ENV: test

      # ── Jest: All other tests with coverage ──────────────────────────────────
      - name: Run Jest tests with coverage
        run: npx jest --testPathPattern="tests/__tests__" --coverage --coverageThreshold='{"global":{"lines":50}}' --passWithNoTests --forceExit --coverageReporters=lcov --coverageReporters=text
        env:
          NODE_ENV: test

      # ── Upload coverage report as artifact ───────────────────────────────────
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      # ── Codecov: Upload coverage results ─────────────────────────────────────
      - name: Upload results to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: skillsconnect-coverage
          fail_ci_if_error: false