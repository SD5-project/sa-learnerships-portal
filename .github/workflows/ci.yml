name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # ── Mocha: Access Control Tests ──────────────────────────────────────────
      - name: Run Mocha access control tests
        run: npx mocha tests/control-access.test.js --timeout 10000
        continue-on-error: true
        env:
          NODE_ENV: test

      # ── Jest: Run tests and generate coverage ─────────────────────────────────
      - name: Run Jest tests with coverage
        run: npx jest --testPathPattern="tests/__tests__" --coverage --passWithNoTests --forceExit
        continue-on-error: true
        env:
          NODE_ENV: test

      # ── Verify lcov.info was created ──────────────────────────────────────────
      - name: Check coverage output
        run: |
          ls -la coverage/ || echo "No coverage folder"
          wc -l coverage/lcov.info || echo "No lcov.info"

      # ── Upload coverage report as artifact ────────────────────────────────────
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn

      # ── Codecov upload ────────────────────────────────────────────────────────
      - name: Upload to Codecov
        if: always()  # Keeps running even if Jest fails
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # Uses the secret we just created
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          verbose: true
