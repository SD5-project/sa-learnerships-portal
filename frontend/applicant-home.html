<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Applicant Dashboard - SkillsConnect</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-wrapper {
            min-height: 100vh;
            background-color: #666666;
            display: flex;
            flex-direction: column;
        }

        /* NAVBAR */
        .navbar {
            background-color: #444444;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid white;
        }

        .navbar h1 {
            color: white;
            font-size: 20px;
            margin: 0;
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 15px;
            color: white;
            font-size: 14px;
        }

        .nav-link-btn {
            background-color: transparent;
            color: white;
            border: 2px solid white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 0;
            text-transform: uppercase;
        }

        .nav-link-btn:hover {
            background-color: white;
            color: #444;
        }

        .logout-btn {
            background-color: crimson;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 0;
        }

        .logout-btn:hover {
            opacity: 0.85;
            background-color: crimson;
            color: white;
        }

        /* MAIN CONTENT */
        .dashboard-content {
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* WELCOME CARD */
        .welcome-card {
            background-color: #545454;
            border: 2px solid white;
            border-radius: 12px;
            padding: 25px;
            color: white;
        }

        .welcome-card h2 {
            margin: 0 0 8px 0;
            font-size: 24px;
        }

        .welcome-card p {
            margin: 0;
            color: #ccc;
            font-size: 14px;
        }

        /* QUICK ACTIONS */
        .quick-actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .action-btn {
            background-color: #545454;
            border: 2px solid white;
            border-radius: 12px;
            padding: 20px 28px;
            color: white;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            flex: 1;
            min-width: 180px;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background-color: white;
            color: #333;
        }

        .action-btn .btn-icon {
            font-size: 24px;
            display: block;
            margin-bottom: 8px;
        }

        /* INFO CARDS ROW */
        .cards-row {
            display: flex;
            gap: 20px;
        }
        .cards-row .info-card {
            min-width: 160px;
            max-width: 220px;
        }

        .info-card {
            background-color: #545454;
            border: 2px solid white;
            border-radius: 12px;
            padding: 20px;
            color: white;
            text-align: center;
        }

        .info-card h3 {
            margin: 0 0 8px 0;
            font-size: 14px;
            color: #ccc;
            text-transform: uppercase;
        }

        .info-card p {
            margin: 0;
            font-size: 18px;
            font-weight: bold;
        }

        /* PROFILE SECTION */
        .profile-section {
            background-color: #545454;
            border: 2px solid white;
            border-radius: 12px;
            padding: 25px;
            color: white;
        }

        .profile-section h2 {
            margin: 0 0 20px 0;
            border-left: 5px solid white;
            padding-left: 10px;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .profile-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .profile-field label {
            font-size: 12px;
            color: #ccc;
            text-transform: uppercase;
            margin: 0;
        }

        .profile-field p {
            margin: 0;
            font-size: 15px;
            font-weight: bold;
        }

        .loading-indicator {
            color: #ccc;
            font-style: italic;
        }

        
        /* NOTIFICATIONS SECTION */
        .notifications-section {
            background-color: #545454;
            border: 2px solid #ffcc00; /* Distinct border for updates */
            border-radius: 12px;
            padding: 20px;
            color: white;
        }

        .notifications-section h2 {
            margin: 0 0 15px 0;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .notification-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        .notification-item {
            background: #444;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #ffcc00;
            font-size: 14px;
        }

        .notification-item.unread {
            background: #4d4d4d;
            border-left: 4px solid #00ff88; /* Green for new unread status */
        }

        .notification-time {
            display: block;
            font-size: 11px;
            color: #aaa;
            margin-top: 5px;
        }

        .no-notifications {
            font-style: italic;
            color: #ccc;
            font-size: 14px;
        }

        /* Scrollbar styling */
        .notification-list::-webkit-scrollbar { width: 5px; }
        .notification-list::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">

        <!-- NAVBAR -->
        <nav class="navbar">
            <h1>SkillsConnect</h1>
            <div class="navbar-right">
                <button class="nav-link-btn" onclick="window.location.href='/listings'">🔍 Browse Opportunities</button>
                <span id="navName"></span>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>
        </nav>

        <!-- MAIN CONTENT -->
        <div class="dashboard-content">

            <!-- WELCOME -->
            <div class="welcome-card">
                <h2 id="welcomeMsg">Welcome 👋</h2>
                <p>Applicant Dashboard — find learnerships, internships and apprenticeships</p>
            </div>

            <!-- INFO CARDS -->
            <div class="cards-row">
                <div class="info-card">
                    <h3>Role</h3>
                    <p id="cardRole">Applicant</p>
                </div>
            </div>

            <!-- QUICK ACTIONS -->
            <div class="quick-actions">
                <button class="action-btn" onclick="window.location.href='/listings'">
                    <span class="btn-icon">🔍</span>Browse Opportunities
                </button>
                <button class="action-btn" id="myApplicationsBtn">
                    <span class="btn-icon">📋</span>My Applications
                </button>
                <button class="action-btn" onclick="window.location.href='/applicant-qualifications'">
                    <span class="btn-icon">🎓</span>My Qualifications
                </button>
                  <button class="action-btn" onclick="window.location.href='/applicant-cv'">
                    <span class="btn-icon">📄</span>My CV
                </button>
            </div>

            <!-- PROFILE -->
            <div class="profile-section">
                <h2>Your Profile</h2>
                <div class="profile-grid">
                    <div class="profile-field">
                        <label>Full Name</label>
                        <p id="profileName" class="loading-indicator">Loading...</p>
                    </div>
                    <div class="profile-field">
                        <label>Email</label>
                        <p id="profileEmail" class="loading-indicator">Loading...</p>
                    </div>
                    <div class="profile-field">
                        <label>Phone Number</label>
                        <p id="profilePhone">-</p>
                    </div>
                </div>
            </div>
            <div class="notifications-section">
                <h2><span>🔔</span> Recent Updates</h2>
                <div id="notificationList" class="notification-list">
                    <p class="loading-indicator">Checking for updates...</p>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
    <script type="module">
        import { auth, db } from "./firebase.js";
        import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { query, collection, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        const token = localStorage.getItem("token");

        if (!token) {
            alert("You must log in first!");
            window.location.href = "/";
        }

        //── Load profile from Firestore via backend ─────────────────────────────
        onAuthStateChanged(auth,async (user) => {
            if (!user) {
                window.location.href = "/";
                return;
            }

            // Verify role
            const idTokenResult = await user.getIdTokenResult();
            const role = idTokenResult.claims.role;

            // Fetch fresh profile data from Firestore
            try {
                const freshToken = await user.getIdToken();
                const res = await fetch(`/api/user-profile?uid=${user.uid}`, {
                    headers: { "Authorization": `Bearer ${freshToken}` }
                });

                if (res.ok) {
                    const data = await res.json();
                    populateProfile(data, user.email);
                } else {
                    populateProfile({}, user.email);
                }
            } catch (err) {
                console.error("Profile fetch error:", err);
                populateProfile({}, user.email);
            }
        });

        function populateProfile(data, authEmail) {
            const fullName   = [data.firstname, data.lastname].filter(Boolean).join(" ") || "-";
            const email      = data.email || authEmail || "-";
            const username   = data.username   || "-";
            const phone       = data.phonenumber || "-";
            const role        = data.role        || "applicant";
            const displayName = fullName !== "-" ? fullName : email;

            document.getElementById("navName").innerText     = displayName;
            document.getElementById("welcomeMsg").innerText  = "Welcome, " + displayName + " 👋";
            document.getElementById("cardRole").innerText    = role;
            document.getElementById("profileName").innerText = fullName;
            document.getElementById("profileEmail").innerText= email;
            document.getElementById("profilePhone").innerText= phone;
        }

        // ── Logout ──────────────────────────────────────────────────────────────
        document.getElementById("logoutBtn").addEventListener("click", async () => {
            try { await signOut(auth); } catch (e) { console.error(e); }
            localStorage.clear();
            window.location.href = "/";
        });

        // ── My Applications placeholder ─────────────────────────────────────────
        document.getElementById("myApplicationsBtn").addEventListener("click", () => {
                    window.location.href = '/applications-page.html';
                    });

        //Notifications
        onAuthStateChanged(auth,(user) => {
            if (user) {
                const q = query(
                    collection(db, "notifications"),
                    where("recipientId", "==", user.uid),
                    orderBy("timestamp", "desc")
                );

                onSnapshot(q, (snapshot) => {
                    const notifications = [];
                    snapshot.forEach((doc) => {
                        notifications.push({ id: doc.id, ...doc.data() });
                    });
                    renderNotifications(notifications);
                }, (error) => {
                    console.error("Notification listener error:", error);
                    document.getElementById("notificationList").innerHTML = `<p class="no-notifications">Could not load notifications.</p>`;
                });
            }
        });

        function renderNotifications(data) {
            const listContainer = document.getElementById("notificationList");
            
            if (data.length === 0) {
                listContainer.innerHTML = `<p class="no-notifications" style="color: #ccc; font-style: italic;">No new updates at this time.</p>`;
                return;
            }

            listContainer.innerHTML = data.map(n => {
                const date = n.timestamp ? new Date(n.timestamp.seconds * 1000).toLocaleString() : "Just now";
                const isUnread = n.status === 'unread' ? 'unread' : '';

                return `
                    <div class="notification-item ${isUnread}">
                        <strong style="color: #ccc;">Update:</strong> ${n.message}
                        <span class="notification-time">${date}</span>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
