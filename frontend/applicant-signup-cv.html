<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Step 5 | SkillsConnect</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        /* ── SIGNUP PAGE SHELL ── */
        .signup-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            box-sizing: border-box;
            background-color: var(--bg-main);
        }

        /* ── CARD ── */
        .signup-card {
            width: 100%;
            max-width: 480px;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-soft);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3), 0 10px 10px -5px rgba(0,0,0,0.2);
            box-sizing: border-box;
        }

        /* ── LOGO ── */
        .signup-logo {
            height: 64px;
            width: auto;
            object-fit: contain;
            display: block;
            margin-bottom: 24px;
        }

        /* ── STEP INDICATOR ── */
        .step-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 28px;
        }

        .step-dot {
            height: 4px;
            border-radius: 2px;
            background: var(--border-soft);
            transition: all 0.25s ease;
            flex: 1;
        }
        .step-dot.active    { background: var(--accent-blue); flex: 2; }
        .step-dot.completed { background: rgba(56,189,248,0.35); }

        /* ── HEADINGS ── */
        .signup-heading {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 6px;
            letter-spacing: -0.02em;
        }

        .signup-subheading {
            font-size: 14px;
            color: var(--text-muted);
            margin: 0 0 28px;
            line-height: 1.5;
        }

        /* ── GLOBAL ERROR ── */
        .global-error {
            display: none;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .global-error:not(:empty) { display: block; }

        /* ── UPLOAD AREA ── */
        .cv-upload-area {
            position: relative;
            border: 1px dashed rgba(56,189,248,0.35);
            border-radius: 12px;
            background-color: rgba(56,189,248,0.03);
            padding: 40px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 16px;
        }

        .cv-upload-area:hover,
        .cv-upload-area.drag-over {
            border-color: rgba(56,189,248,0.7);
            background-color: rgba(56,189,248,0.07);
        }

        .cv-upload-area input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .cv-upload-icon {
            font-size: 36px;
            display: block;
            margin-bottom: 12px;
            pointer-events: none;
        }

        .cv-upload-label {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 6px;
            pointer-events: none;
        }

        .cv-upload-hint {
            font-size: 13px;
            color: var(--text-muted);
            pointer-events: none;
        }

        /* ── FILE SELECTED STATE ── */
        .cv-file-selected {
            display: none;
            align-items: center;
            gap: 12px;
            background-color: rgba(56,189,248,0.08);
            border: 1px solid rgba(56,189,248,0.2);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 16px;
        }

        .cv-file-selected.visible {
            display: flex;
        }

        .cv-file-icon {
            font-size: 22px;
            flex-shrink: 0;
        }

        .cv-file-info {
            flex: 1;
            min-width: 0;
        }

        .cv-file-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cv-file-size {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .cv-file-remove {
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2);
            color: #fca5a5;
            border-radius: 6px;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s ease;
            padding: 0;
        }

        .cv-file-remove:hover {
            background: rgba(239,68,68,0.2);
            border-color: rgba(239,68,68,0.4);
        }

        /* ── OPTIONAL NOTE ── */
        .cv-optional-note {
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            margin: 0 0 28px;
            line-height: 1.5;
        }

        /* ── ACTIONS ROW ── */
        .signup-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-back {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-soft);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-back:hover {
            background-color: rgba(255,255,255,0.05);
            color: var(--text-main);
            border-color: rgba(255,255,255,0.15);
        }

        .btn-next {
            flex: 2;
            background-color: var(--accent-blue);
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .btn-next:hover  { background-color: var(--accent-hover); transform: translateY(-1px); }
        .btn-next:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    </style>
</head>
<body class="signup-page">
    <div class="signup-card">

        <img src="SkillsConnect Logo 2.PNG" class="signup-logo" alt="SkillsConnect">

        <!-- 5-step indicator: step 5 active -->
        <div class="step-indicator">
            <div class="step-dot completed"></div>
            <div class="step-dot completed"></div>
            <div class="step-dot completed"></div>
            <div class="step-dot completed"></div>
            <div class="step-dot active"></div>
        </div>

        <h2 class="signup-heading">Upload your CV</h2>
        <p class="signup-subheading">Optional — you can upload or update it later from your profile.</p>

        <div id="global-error" class="global-error"></div>

        <div class="cv-upload-area" id="upload-area">
            <input type="file" id="cv-input" accept=".pdf,.doc,.docx">
            <span class="cv-upload-icon">📄</span>
            <div class="cv-upload-label">Click to browse or drag your CV here</div>
            <div class="cv-upload-hint">PDF, DOC, or DOCX &nbsp;·&nbsp; Max 10 MB</div>
        </div>

        <div class="cv-file-selected" id="file-info">
            <span class="cv-file-icon">📎</span>
            <div class="cv-file-info">
                <div class="cv-file-name" id="file-name"></div>
                <div class="cv-file-size" id="file-size"></div>
            </div>
            <button class="cv-file-remove" id="remove-file" title="Remove file">×</button>
        </div>

        <p class="cv-optional-note">You can still complete sign-up without a CV.</p>

        <div class="signup-actions">
            <a href="applicant-signup-qualifications.html" class="btn-back">← Back</a>
            <button class="btn-next" id="submit-btn">Complete sign-up</button>
        </div>
    </div>

    <script>
        const uploadArea  = document.getElementById('upload-area');
        const cvInput     = document.getElementById('cv-input');
        const fileInfo    = document.getElementById('file-info');
        const fileName    = document.getElementById('file-name');
        const fileSize    = document.getElementById('file-size');
        const removeBtn   = document.getElementById('remove-file');
        const errorDiv    = document.getElementById('global-error');
        const submitBtn   = document.getElementById('submit-btn');

        const MAX_MB = 10;
        const ALLOWED = ['.pdf', '.doc', '.docx'];

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function showError(msg) {
            errorDiv.textContent = msg;
        }

        function clearError() {
            errorDiv.textContent = '';
        }

        function setFile(file) {
            clearError();

            const ext = '.' + file.name.split('.').pop().toLowerCase();
            if (!ALLOWED.includes(ext)) {
                showError('Invalid file type. Please upload a PDF, DOC, or DOCX file.');
                clearFile();
                return;
            }

            if (file.size > MAX_MB * 1024 * 1024) {
                showError(`File is too large. Maximum size is ${MAX_MB} MB.`);
                clearFile();
                return;
            }

            fileName.textContent = file.name;
            fileSize.textContent = formatSize(file.size);
            fileInfo.classList.add('visible');
            uploadArea.style.display = 'none';
        }

        function clearFile() {
            cvInput.value = '';
            fileInfo.classList.remove('visible');
            uploadArea.style.display = '';
        }

        cvInput.addEventListener('change', () => {
            if (cvInput.files[0]) setFile(cvInput.files[0]);
        });

        removeBtn.addEventListener('click', () => {
            clearError();
            clearFile();
        });

        // Drag-and-drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('drag-over');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file) {
                // Sync to input for module JS compatibility
                const dt = new DataTransfer();
                dt.items.add(file);
                cvInput.files = dt.files;
                setFile(file);
            }
        });
    </script>

    <script type="module" src="applicant-signup-cv.js"></script>
</body>
</html>
