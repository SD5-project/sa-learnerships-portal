<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Step 2 | SkillsConnect</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        /* ── SIGNUP PAGE SHELL ── */
        .signup-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            box-sizing: border-box;
            background-color: var(--bg-main);
        }
 
        /* ── CARD ── */
        .signup-card {
            width: 100%;
            max-width: 420px;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-soft);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3), 0 10px 10px -5px rgba(0,0,0,0.2);
            box-sizing: border-box;
        }
 
        /* ── LOGO ── */
        .signup-logo {
            height: 64px;
            width: auto;
            object-fit: contain;
            display: block;
            margin-bottom: 24px;
        }
 
        /* ── STEP INDICATOR ── */
        .step-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 28px;
        }
 
        .step-dot {
            height: 4px;
            border-radius: 2px;
            background: var(--border-soft);
            transition: all 0.25s ease;
            flex: 1;
        }
        .step-dot.active    { background: var(--accent-blue); flex: 2; }
        .step-dot.completed { background: rgba(56,189,248,0.35); }
 
        /* ── HEADINGS ── */
        .signup-heading {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 6px;
            letter-spacing: -0.02em;
        }
 
        .signup-subheading {
            font-size: 14px;
            color: var(--text-muted);
            margin: 0 0 28px;
            line-height: 1.5;
        }
 
        /* ── GLOBAL ERROR ── */
        .global-error {
            display: none;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .global-error:not(:empty) { display: block; }
 
        /* ── FORM FIELDS ── */
        .signup-field {
            display: flex;
            flex-direction: column;
            gap: 7px;
            margin-bottom: 20px;
        }
 
        .signup-field label {
            font-size: 13px;
            font-weight: 500;
            color: #cbd5e1;
        }
 
        .signup-field input {
            background-color: #0f172a;
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-main);
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
 
        .signup-field input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
        }
 
        .field-error {
            font-size: 12px;
            color: #fca5a5;
            min-height: 16px;
            display: block;
        }
 
        /* ── ACTIONS ── */
        .signup-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
 
        .btn-back {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-soft);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .btn-back:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }
 
        .btn-next {
            flex: 2;
            background-color: var(--accent-blue);
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s ease;
        }
        .btn-next:hover { background-color: var(--accent-hover); transform: translateY(-1px); }
        .btn-next:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
 
        /* ── FOOTER LINK ── */
        .back-to-login {
            margin: 24px 0 0;
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
        }
        .back-to-login a {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }
        .back-to-login a:hover { color: var(--accent-hover); text-decoration: underline; }
    </style>
</head>
<body class="signup-page" data-role="applicant">
    <div class="signup-card">
 
        <img src="SkillsConnect Logo 2.PNG" class="signup-logo" alt="SkillsConnect">
 
        <!-- 5-step indicator: step 2 active -->
        <div class="step-indicator">
            <div class="step-dot completed"></div>
            <div class="step-dot active"></div>
            <div class="step-dot"></div>
            <div class="step-dot"></div>
            <div class="step-dot"></div>
        </div>
 
        <h2 class="signup-heading">Create your password</h2>
        <p class="signup-subheading" id="page-subheading">
            Create a password so you can log in to SkillsConnect at any time.
        </p>
 
        <div id="global-error" class="global-error"></div>
 
        <div class="signup-field" id="email-field">
            <label for="email">Email address</label>
            <input type="email" id="email" autocomplete="email" placeholder="your@email.com">
            <span class="field-error" id="email-error"></span>
        </div>
 
        <div class="signup-field">
            <label for="password">Password</label>
            <input type="password" id="password" autocomplete="new-password" placeholder="At least 9 characters">
            <span class="field-error" id="password-error"></span>
        </div>
 
        <div class="signup-field">
            <label for="confirm-password">Confirm password</label>
            <input type="password" id="confirm-password" autocomplete="new-password" placeholder="Repeat your password">
            <span class="field-error" id="confirm-error"></span>
        </div>
 
        <div class="signup-actions">
            <a href="applicant-signup-identity.html" class="btn-back">← Back</a>
            <button class="btn-next" id="next-btn">Next →</button>
        </div>
 
        <p class="back-to-login">Already have an account? <a href="index.html">Log in</a></p>
    </div>
 
    <script type="module" src="signup-password.js"></script>
</body>
</html>
