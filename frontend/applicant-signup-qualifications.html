<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Step 4 | SkillsConnect</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        /* ── SIGNUP PAGE SHELL ── */
        .signup-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            box-sizing: border-box;
            background-color: var(--bg-main);
        }

        /* ── CARD ── */
        .signup-card {
            width: 100%;
            max-width: 480px;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-soft);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3), 0 10px 10px -5px rgba(0,0,0,0.2);
            box-sizing: border-box;
        }

        /* ── LOGO ── */
        .signup-logo {
            height: 64px;
            width: auto;
            object-fit: contain;
            display: block;
            margin-bottom: 24px;
        }

        /* ── STEP INDICATOR ── */
        .step-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 28px;
        }

        .step-dot {
            height: 4px;
            border-radius: 2px;
            background: var(--border-soft);
            transition: all 0.25s ease;
            flex: 1;
        }
        .step-dot.active    { background: var(--accent-blue); flex: 2; }
        .step-dot.completed { background: rgba(56,189,248,0.35); }

        /* ── HEADINGS ── */
        .signup-heading {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 6px;
            letter-spacing: -0.02em;
        }

        .signup-subheading {
            font-size: 14px;
            color: var(--text-muted);
            margin: 0 0 28px;
            line-height: 1.5;
        }

        /* ── GLOBAL ERROR ── */
        .global-error {
            display: none;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .global-error:not(:empty) { display: block; }

        /* ── QUALIFICATION LIST ── */
        .qualification-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }

        .qualification-item {
            background-color: rgba(15,23,42,0.6);
            border: 1px solid var(--border-soft);
            border-radius: 10px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            transition: border-color 0.2s ease;
        }

        .qualification-item:focus-within {
            border-color: rgba(56,189,248,0.3);
        }

        .qual-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .qual-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .qual-field.full-width {
            grid-column: 1 / -1;
        }

        .qual-field label {
            font-size: 12px;
            font-weight: 500;
            color: #cbd5e1;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .qual-field input,
        .qual-field select {
            background-color: #0f172a;
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-main);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.2s ease;
            -webkit-appearance: none;
        }

        .qual-field input:focus,
        .qual-field select:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
        }

        .qual-field select option {
            background-color: #1e293b;
            color: var(--text-main);
        }

        .btn-remove-qual {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2);
            color: #fca5a5;
            border-radius: 6px;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 0;
            line-height: 1;
        }

        .btn-remove-qual:hover {
            background: rgba(239,68,68,0.2);
            border-color: rgba(239,68,68,0.4);
        }

        /* ── ADD BUTTON ── */
        .btn-add-qualification {
            width: 100%;
            background-color: transparent;
            color: var(--accent-blue);
            border: 1px dashed rgba(56,189,248,0.35);
            border-radius: 8px;
            padding: 11px 16px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 24px;
        }

        .btn-add-qualification:hover {
            background-color: rgba(56,189,248,0.06);
            border-color: rgba(56,189,248,0.6);
        }

        .btn-add-qualification:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ── ACTIONS ROW ── */
        .signup-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-back {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-soft);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-back:hover {
            background-color: rgba(255,255,255,0.05);
            color: var(--text-main);
            border-color: rgba(255,255,255,0.15);
        }

        .btn-next {
            flex: 2;
            background-color: var(--accent-blue);
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .btn-next:hover { background-color: var(--accent-hover); transform: translateY(-1px); }
        .btn-next:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* ── FOOTER LINK ── */
        .back-to-login {
            margin: 24px 0 0;
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
        }

        .back-to-login a {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .back-to-login a:hover { color: var(--accent-hover); text-decoration: underline; }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 24px 16px;
            color: var(--text-muted);
            font-size: 14px;
            border: 1px dashed var(--border-soft);
            border-radius: 10px;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .empty-state span {
            display: block;
            font-size: 24px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body class="signup-page">
    <div class="signup-card">

        <img src="SkillsConnect Logo 2.PNG" class="signup-logo" alt="SkillsConnect">

        <!-- 5-step indicator: step 4 active -->
        <div class="step-indicator">
            <div class="step-dot completed"></div>
            <div class="step-dot completed"></div>
            <div class="step-dot completed"></div>
            <div class="step-dot active"></div>
            <div class="step-dot"></div>
        </div>

        <h2 class="signup-heading">Qualifications</h2>
        <p class="signup-subheading">Add up to 8 qualifications. You can skip this and add them from your profile later.</p>

        <div id="global-error" class="global-error"></div>

        <div class="qualification-list" id="qualification-list">
            <div class="empty-state" id="empty-state">
                <span>🎓</span>
                No qualifications added yet.<br>Click below to add one.
            </div>
        </div>

        <button class="btn-add-qualification" id="add-qual-btn">+ Add Qualification</button>

        <div class="signup-actions">
            <a href="applicant-signup-details.html" class="btn-back">← Back</a>
            <button class="btn-next" id="next-btn">Next →</button>
        </div>

        <p class="back-to-login">Already have an account? <a href="index.html">Log in</a></p>
    </div>

    <script>
        const MAX_QUALS = 8;
        const list = document.getElementById('qualification-list');
        const addBtn = document.getElementById('add-qual-btn');
        const emptyState = document.getElementById('empty-state');
        const errorDiv = document.getElementById('global-error');
        let count = 0;

        const DEGREE_TYPES = [
            'High School Diploma / Matric',
            'Certificate',
            'Diploma',
            "Bachelor's Degree",
            "Honours Degree",
            "Master's Degree",
            'Doctoral Degree (PhD)',
            'Professional Qualification',
            'Other',
        ];

        function showError(msg) {
            errorDiv.textContent = msg;
        }

        function clearError() {
            errorDiv.textContent = '';
        }

        function updateEmptyState() {
            emptyState.style.display = count === 0 ? 'block' : 'none';
            addBtn.disabled = count >= MAX_QUALS;
            addBtn.textContent = count >= MAX_QUALS
                ? `Maximum ${MAX_QUALS} qualifications reached`
                : '+ Add Qualification';
        }

        function addQualification() {
            if (count >= MAX_QUALS) return;
            clearError();

            count++;
            emptyState.style.display = 'none';

            const item = document.createElement('div');
            item.className = 'qualification-item';
            item.dataset.index = count;

            const degreeOptions = DEGREE_TYPES.map(d =>
                `<option value="${d}">${d}</option>`
            ).join('');

            item.innerHTML = `
                <button class="btn-remove-qual" title="Remove qualification" aria-label="Remove qualification">×</button>
                <div class="qual-row">
                    <div class="qual-field">
                        <label>Degree / Certificate Type</label>
                        <select>
                            <option value="" disabled selected>Select type</option>
                            ${degreeOptions}
                        </select>
                    </div>
                    <div class="qual-field">
                        <label>Year Obtained</label>
                        <input type="number" placeholder="${new Date().getFullYear()}" min="1950" max="${new Date().getFullYear()}" inputmode="numeric">
                    </div>
                </div>
                <div class="qual-row">
                    <div class="qual-field full-width">
                        <label>Field of Study</label>
                        <input type="text" placeholder="e.g. Computer Science, Finance">
                    </div>
                </div>
                <div class="qual-row">
                    <div class="qual-field full-width">
                        <label>Institution</label>
                        <input type="text" placeholder="e.g. University of Cape Town">
                    </div>
                </div>
            `;

            item.querySelector('.btn-remove-qual').addEventListener('click', () => {
                item.remove();
                count--;
                updateEmptyState();
            });

            list.appendChild(item);
            updateEmptyState();
        }

        addBtn.addEventListener('click', addQualification);

        document.getElementById('next-btn').addEventListener('click', () => {
            // Collect qualifications and pass to next step via sessionStorage
            const items = list.querySelectorAll('.qualification-item');
            const qualifications = [];

            for (const item of items) {
                const inputs = item.querySelectorAll('input, select');
                const type = inputs[0].value;
                const year = inputs[1].value;
                const field = inputs[2].value.trim();
                const institution = inputs[3].value.trim();

                if (!type || !field || !institution) {
                    showError('Please complete all fields for each qualification, or remove incomplete entries.');
                    item.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    return;
                }

                qualifications.push({ type, year, field, institution });
            }

            clearError();

            try {
                sessionStorage.setItem('qualifications', JSON.stringify(qualifications));
            } catch (e) {
                // storage unavailable — proceed anyway
            }

            // Hand off to JS module if present, otherwise proceed
            if (typeof window.__nextStep === 'function') {
                window.__nextStep(qualifications);
            } else {
                // Fallback: navigate to next step
                window.location.href = 'applicant-signup-review.html';
            }
        });

        updateEmptyState();
    </script>

    <!-- Module script hook for external JS to override __nextStep -->
    <script type="module">
        try {
            const mod = await import('./applicant-signup-qualifications.js');
            if (typeof mod.nextStep === 'function') {
                window.__nextStep = mod.nextStep;
            }
        } catch (e) {
            // Module not found — inline fallback handles navigation
        }
    </script>
</body>
</html>
