<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My CV | SkillsConnect</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        .page-wrapper { min-height: 100vh; display: flex; flex-direction: column; }

        .dashboard-navbar {
            background-color: var(--bg-surface);
            border-bottom: 1px solid var(--border-soft);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar-logo { height: 70px; width: auto; object-fit: contain; display: block; }
        .navbar-actions { display: flex; align-items: center; gap: 16px; }

        .btn-back {
            background: rgba(56,189,248,0.1);
            color: var(--accent-blue);
            border: 1px solid rgba(56,189,248,0.2);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-back:hover { background: var(--accent-blue); color: #000; }

        .btn-logout {
            background: rgba(239,68,68,0.1);
            color: #fca5a5;
            border: 1px solid rgba(239,68,68,0.2);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-logout:hover { background: #ef4444; color: #fff; }

        .main-content {
            max-width: 700px;
            margin: 0 auto;
            padding: 48px 24px;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .page-title {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 4px;
        }
        .page-subtitle { font-size: 14px; color: var(--text-muted); margin: 0; }

        .cv-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-soft);
            border-radius: 16px;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .cv-card h2 {
            margin: 0;
            font-size: 17px;
            font-weight: 600;
            color: var(--text-main);
        }

        .current-cv {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px;
            background: rgba(56,189,248,0.06);
            border: 1px solid rgba(56,189,248,0.15);
            border-radius: 10px;
        }
        .cv-icon { font-size: 28px; }
        .cv-filename {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
        }
        .cv-actions { display: flex; gap: 10px; margin-left: auto; flex-wrap: wrap; }

        .btn-view {
            background: rgba(56,189,248,0.1);
            color: var(--accent-blue);
            border: 1px solid rgba(56,189,248,0.2);
            padding: 7px 14px;
            border-radius: 7px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .btn-view:hover { background: var(--accent-blue); color: #000; }

        .btn-delete {
            background: rgba(239,68,68,0.1);
            color: #fca5a5;
            border: 1px solid rgba(239,68,68,0.2);
            padding: 7px 14px;
            border-radius: 7px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-delete:hover { background: #ef4444; color: #fff; }

        .no-cv {
            padding: 20px;
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            font-size: 14px;
            border: 1px dashed var(--border-soft);
            border-radius: 10px;
        }

        /* Upload area */
        .upload-zone {
            border: 2px dashed rgba(56,189,248,0.3);
            border-radius: 12px;
            padding: 40px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(56,189,248,0.03);
        }
        .upload-zone:hover, .upload-zone.drag-over {
            border-color: var(--accent-blue);
            background: rgba(56,189,248,0.07);
        }
        .upload-zone p { margin: 0; color: var(--text-muted); font-size: 14px; }
        .upload-zone strong { color: var(--accent-blue); }
        .upload-zone .hint { font-size: 12px; margin-top: 8px; opacity: 0.6; }
        #cvFileInput { display: none; }

        .btn-upload {
            background: var(--accent-blue);
            color: #000;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            align-self: flex-start;
        }
        .btn-upload:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-upload:not(:disabled):hover { background: #7dd3fc; }

        .selected-file {
            display: none;
            padding: 12px 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border-soft);
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-main);
        }

        .toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            padding: 14px 22px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            z-index: 9999;
            opacity: 0;
            transform: translateY(12px);
            transition: all 0.3s ease;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; }
        .toast.error   { background: rgba(239,68,68,0.15);  border: 1px solid rgba(239,68,68,0.3);  color: #fca5a5; }
    </style>
</head>
<body>
<div class="page-wrapper">

    <nav class="dashboard-navbar">
        <img src="SkillsConnect Logo 2.PNG" alt="SkillsConnect Logo" class="navbar-logo">
        <div class="navbar-actions">
            <button class="btn-back" onclick="window.location.href='/applicant-home'">← Dashboard</button>
            <button class="btn-logout" id="logoutBtn">Logout</button>
        </div>
    </nav>

    <main class="main-content">

        <div>
            <h1 class="page-title">📄 My CV</h1>
            <p class="page-subtitle">Upload and manage your curriculum vitae. Supported formats: PDF, DOC, DOCX (max 10MB).</p>
        </div>

        <!-- Current CV -->
        <div class="cv-card">
            <h2>Current CV</h2>
            <div id="currentCvSection">
                <p style="color:var(--text-muted);font-style:italic;font-size:14px;">Loading...</p>
            </div>
        </div>

        <!-- Upload new CV -->
        <div class="cv-card">
            <h2>Upload New CV</h2>

            <div class="upload-zone" id="uploadZone">
                <p>🗂️ <strong>Click to browse</strong> or drag and drop your CV here</p>
                <p class="hint">PDF, DOC or DOCX — maximum 10 MB</p>
            </div>
            <input type="file" id="cvFileInput" accept=".pdf,.doc,.docx">

            <div class="selected-file" id="selectedFile">
                📎 <span id="selectedFileName"></span>
            </div>

            <button class="btn-upload" id="uploadBtn" disabled>Upload CV</button>
        </div>

    </main>
</div>

<div class="toast" id="toast"></div>

<script type="module">
    import { auth } from "./firebase.js";
    import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    let currentUser = null;

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = "/"; return; }
        currentUser = user;
        await loadProfile();
    });

    async function loadProfile() {
        try {
            const token = await currentUser.getIdToken(true);
            const res   = await fetch(`/api/user-profile?uid=${currentUser.uid}`, {
                headers: { "Authorization": `Bearer ${token}` }
            });
            if (!res.ok) throw new Error("Profile load failed");
            const data = await res.json();
            renderCurrentCv(data.cv, data.cvFilename);
        } catch (e) {
            console.error(e);
            renderCurrentCv(null, null);
        }
    }

    function renderCurrentCv(cvUrl, cvFilename) {
        const section = document.getElementById("currentCvSection");
        if (!cvUrl) {
            section.innerHTML = `<div class="no-cv">No CV uploaded yet. Use the section below to add one.</div>`;
            return;
        }
        const name = cvFilename || "My CV";
        section.innerHTML = `
            <div class="current-cv">
                <span class="cv-icon">📄</span>
                <span class="cv-filename">${name}</span>
                <div class="cv-actions">
                    <a class="btn-view" href="${cvUrl}" target="_blank" rel="noopener">View</a>
                    <button class="btn-delete" id="deleteCvBtn">Delete</button>
                </div>
            </div>`;

        document.getElementById("deleteCvBtn").addEventListener("click", deleteCv);
    }

    async function deleteCv() {
        if (!confirm("Are you sure you want to delete your CV?")) return;
        try {
            const token = await currentUser.getIdToken(true);
            const res   = await fetch("/api/delete-cv", {
                method: "DELETE",
                headers: { "Authorization": `Bearer ${token}` }
            });
            if (res.ok) {
                showToast("CV deleted successfully", "success");
                renderCurrentCv(null, null);
            } else {
                const d = await res.json();
                showToast(d.error || "Delete failed", "error");
            }
        } catch (e) {
            showToast("Network error", "error");
        }
    }

    // ── Upload zone ────────────────────────────────────────────────────────────
    const uploadZone   = document.getElementById("uploadZone");
    const fileInput    = document.getElementById("cvFileInput");
    const uploadBtn    = document.getElementById("uploadBtn");
    const selectedFile = document.getElementById("selectedFile");
    const selectedName = document.getElementById("selectedFileName");

    let chosenFile = null;

    uploadZone.addEventListener("click", () => fileInput.click());

    uploadZone.addEventListener("dragover", e => { e.preventDefault(); uploadZone.classList.add("drag-over"); });
    uploadZone.addEventListener("dragleave", ()  => uploadZone.classList.remove("drag-over"));
    uploadZone.addEventListener("drop", e => {
        e.preventDefault();
        uploadZone.classList.remove("drag-over");
        if (e.dataTransfer.files[0]) handleFileSelect(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener("change", () => {
        if (fileInput.files[0]) handleFileSelect(fileInput.files[0]);
    });

    function handleFileSelect(file) {
        const allowed = ["application/pdf",
            "application/msword",
            "application/vnd.openxmlformats-officedocument.wordprocessingml.document"];
        if (!allowed.includes(file.type) && !file.name.match(/\.(pdf|doc|docx)$/i)) {
            showToast("Only PDF, DOC or DOCX files are allowed", "error");
            return;
        }
        if (file.size > 10 * 1024 * 1024) {
            showToast("File must be under 10 MB", "error");
            return;
        }
        chosenFile = file;
        selectedName.textContent = file.name;
        selectedFile.style.display = "block";
        uploadBtn.disabled = false;
    }

    uploadBtn.addEventListener("click", async () => {
        if (!chosenFile || !currentUser) return;
        uploadBtn.disabled = true;
        uploadBtn.textContent = "Uploading...";
        try {
            const token   = await currentUser.getIdToken(true);
            const formData = new FormData();
            formData.append("cv",  chosenFile);
            formData.append("uid", currentUser.uid);

            const res = await fetch("/api/upload-cv", {
                method: "POST",
                headers: { "Authorization": `Bearer ${token}` },
                body: formData
            });
            const data = await res.json();
            if (res.ok) {
                showToast("CV uploaded successfully ✓", "success");
                await loadProfile();
                chosenFile = null;
                selectedFile.style.display = "none";
                fileInput.value = "";
            } else {
                showToast(data.error || "Upload failed", "error");
            }
        } catch (e) {
            showToast("Network error during upload", "error");
        } finally {
            uploadBtn.disabled = false;
            uploadBtn.textContent = "Upload CV";
        }
    });

    // ── Logout ─────────────────────────────────────────────────────────────────
    document.getElementById("logoutBtn").addEventListener("click", async () => {
        try { await signOut(auth); } catch (e) { console.error(e); }
        localStorage.clear();
        window.location.href = "/";
    });

    // ── Toast ──────────────────────────────────────────────────────────────────
    function showToast(msg, type = "success") {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.className   = `toast ${type} show`;
        setTimeout(() => { t.className = "toast"; }, 3500);
    }
</script>
</body>
</html>
