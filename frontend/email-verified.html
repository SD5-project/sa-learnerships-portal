<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification | SkillsConnect</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        /* ── PAGE SHELL ── */
        .signup-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            box-sizing: border-box;
            background-color: var(--bg-main);
        }

        /* ── CARD ── */
        .signup-card {
            width: 100%;
            max-width: 420px;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-soft);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3), 0 10px 10px -5px rgba(0,0,0,0.2);
            box-sizing: border-box;
            text-align: center;
        }

        /* ── LOGO ── */
        .signup-logo {
            height: 64px;
            width: auto;
            object-fit: contain;
            display: block;
            margin: 0 auto 32px;
        }

        /* ── STATUS ICON ── */
        .status-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 28px;
            transition: all 0.3s ease;
        }

        .status-icon.loading {
            background: rgba(56,189,248,0.1);
            border: 1px solid rgba(56,189,248,0.2);
            animation: pulse 1.5s ease-in-out infinite;
        }

        .status-icon.success {
            background: rgba(74,222,128,0.12);
            border: 1px solid rgba(74,222,128,0.25);
        }

        .status-icon.error {
            background: rgba(248,113,113,0.12);
            border: 1px solid rgba(248,113,113,0.25);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.5; }
        }

        /* ── HEADINGS ── */
        .signup-heading {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 10px;
            letter-spacing: -0.02em;
        }

        .signup-subheading {
            font-size: 14px;
            color: var(--text-muted);
            margin: 0 0 28px;
            line-height: 1.6;
        }

        /* ── GLOBAL ERROR ── */
        .global-error {
            display: none;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            line-height: 1.5;
            text-align: left;
        }
        .global-error:not(:empty) { display: block; }

        /* ── CONTINUE BUTTON ── */
        #action {
            display: none;
            margin-top: 8px;
        }

        .btn-next {
            width: 100%;
            background-color: var(--accent-blue);
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s ease;
        }
        .btn-next:hover { background-color: var(--accent-hover); transform: translateY(-1px); }
        .btn-next:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    </style>
</head>
<body class="signup-page">
    <div class="signup-card">

        <img src="SkillsConnect Logo 2.PNG" class="signup-logo" alt="SkillsConnect">

        <div class="status-icon loading" id="status-icon">⏳</div>

        <h2 class="signup-heading" id="heading">Verifying your email…</h2>
        <p class="signup-subheading" id="message">Please wait a moment.</p>

        <div id="global-error" class="global-error"></div>

        <div id="action">
            <button class="btn-next" id="continue-btn"></button>
        </div>

    </div>

    <script type="module" src="email-verified.js"></script>
</body>
</html>
