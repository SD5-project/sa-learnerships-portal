<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification | SkillsConnect</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="signup.css">
</head>
<body class="signup-page">
    <div class="signup-card">
        <img src="SkillsConnect Logo 2.PNG" class="signup-logo" alt="SkillsConnect">

        <h2 class="signup-heading" id="heading">Verifying your email…</h2>
        <p class="signup-subheading" id="message">Please wait a moment.</p>

        <div id="global-error" class="global-error"></div>

        <div id="action" style="display:none; margin-top:20px;">
            <button class="btn-next" id="continue-btn" style="width:100%;"></button>
        </div>
    </div>

    <script type="module" src="email-verified.js"></script>
</body>
</html>
