<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | SkillsConnect</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            min-height: 100vh;
            background-color: #666666;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background-color: #545454;
            border: 2px solid white;
            border-radius: 12px;
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .card img {
            width: 120px;
            margin: 0 auto 20px;
            display: block;
        }

        .card h2 {
            color: white;
            font-size: 22px;
            margin: 0 0 8px;
            border-left: 5px solid white;
            padding-left: 10px;
        }

        .card p.subtitle {
            color: #ccc;
            font-size: 13px;
            margin: 0 0 24px;
            line-height: 1.5;
        }

        .card label {
            color: white;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
            display: block;
        }

        .card input[type="email"] {
            width: 100%;
            box-sizing: border-box;
            background: #444;
            color: white;
            border: 1.5px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            padding: 10px 13px;
            font-size: 14px;
            margin: 0 0 20px;
            outline: none;
            transition: border-color 0.2s;
        }
        .card input[type="email"]:focus { border-color: white; }
        .card input[type="email"]::placeholder { color: #999; }

        #msg {
            display: none;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 16px;
            line-height: 1.5;
        }
        #msg.success {
            background: rgba(74,222,128,0.12);
            border: 1px solid #4ade80;
            color: #4ade80;
        }
        #msg.error {
            background: rgba(239,68,68,0.12);
            border: 1px solid #f87171;
            color: #fca5a5;
        }

        .btn-send {
            width: 100%;
            background: white;
            color: #333;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin: 0 0 16px;
            transition: background 0.2s;
        }
        .btn-send:hover { background: #ddd; }
        .btn-send:disabled { background: #888; cursor: not-allowed; }

        .back-link {
            text-align: center;
            font-size: 13px;
            color: #ccc;
        }
        .back-link a {
            color: white;
            text-decoration: underline;
        }
        .back-link a:hover { color: #ddd; }
    </style>
</head>
<body>
<div class="card">
    <img src="SkillsConnect Logo 2.PNG" alt="SkillsConnect">
    <h2>Reset Password</h2>
    <p class="subtitle">Enter the email address linked to your account and we'll send you a reset link.</p>

    <div id="msg"></div>

    <label for="reset-email">Email Address</label>
    <input type="email" id="reset-email" placeholder="you@example.com" autocomplete="email">

    <button class="btn-send" id="sendBtn">Send Reset Link</button>

    <div class="back-link">
        Remembered it? <a href="/">Back to Login</a>
    </div>
</div>

<script type="module">
    import { auth } from "/firebase.js";
    import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const sendBtn  = document.getElementById("sendBtn");
    const emailInput = document.getElementById("reset-email");
    const msg      = document.getElementById("msg");

    function showMsg(text, type) {
        msg.textContent   = text;
        msg.className     = type;
        msg.style.display = "block";
    }

    sendBtn.addEventListener("click", async () => {
        const email = emailInput.value.trim();

        if (!email) {
            showMsg("Please enter your email address.", "error");
            return;
        }

        sendBtn.disabled    = true;
        sendBtn.textContent = "Sending…";
        msg.style.display   = "none";

        try {
            await sendPasswordResetEmail(auth, email);
            showMsg(
                "Reset link sent! Check your inbox (and spam folder). The link expires in 1 hour.",
                "success"
            );
            emailInput.value    = "";
        } catch (err) {
            if (err.code === "auth/user-not-found" || err.code === "auth/invalid-email") {
                showMsg("No account found with that email address.", "error");
            } else if (err.code === "auth/too-many-requests") {
                showMsg("Too many attempts. Please wait a moment and try again.", "error");
            } else {
                showMsg("Something went wrong. Please try again.", "error");
            }
        } finally {
            sendBtn.disabled    = false;
            sendBtn.textContent = "Send Reset Link";
        }
    });

    emailInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendBtn.click();
    });
</script>
</body>
</html>
