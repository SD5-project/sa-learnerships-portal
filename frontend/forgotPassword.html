<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | SkillsConnect</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        /* Small local overrides specifically for message containers */
        .msg-box {
            display: none;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .msg-box.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #fca5a5;
        }
        .msg-box.success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid #22c55e;
            color: #bbf7d0;
        }
    </style>
</head>
<body>
    <div class="form-panel">
        
        <div class="form-card">
            <div class="form-logo-header">
                <img src="SkillsConnect Logo 2.PNG" alt="SkillsConnect Logo" class="form-panel-logo">
            </div>

            <div class="brand-content">
                <h1 class="brand-title">Reset Password</h1>
                <p class="brand-tagline">Enter your email address below and we'll send you a link to reset your password.</p>
            </div>

            <div id="msg" class="msg-box"></div>

            <form id="reset-form" onsubmit="return false;">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@company.com" required autocomplete="email">
                </div>

                <button type="button" id="sendBtn" class="btn-primary">Send Reset Link</button>
            </form>

            <div class="form-header" style="margin-bottom: 0; margin-top: 24px;">
                <p class="signup-prompt" style="text-align: center;">
                    Remember your password? <a href="index.html">Log in</a>
                </p>
            </div>
        </div>

    </div>

    <script type="module">
        import { auth } from "./firebase-config.js";
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const emailInput = document.getElementById("email");
        const sendBtn    = document.getElementById("sendBtn");
        const msg        = document.getElementById("msg");

        function showMsg(text, type) {
            msg.textContent   = text;
            msg.className     = `msg-box ${type}`;
            msg.style.display = "block";
        }

        sendBtn.addEventListener("click", async () => {
            const email = emailInput.value.trim();

            if (!email) {
                showMsg("Please enter your email address.", "error");
                return;
            }

            sendBtn.disabled    = true;
            sendBtn.textContent = "Sending…";
            msg.style.display   = "none";

            try {
                await sendPasswordResetEmail(auth, email);
                showMsg(
                    "Reset link sent! Check your inbox (and spam folder). The link expires in 1 hour.",
                    "success"
                );
                emailInput.value    = "";
            } catch (err) {
                if (err.code === "auth/user-not-found" || err.code === "auth/invalid-email") {
                    showMsg("No account found with that email address.", "error");
                } else if (err.code === "auth/too-many-requests") {
                    showMsg("Too many attempts. Please wait a moment and try again.", "error");
                } else {
                    showMsg("Something went wrong. Please try again.", "error");
                }
            } finally {
                sendBtn.disabled    = false;
                sendBtn.textContent = "Send Reset Link";
            }
        });

        emailInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                sendBtn.click();
            }
        });
    </script>
</body>
</html>
