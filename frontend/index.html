<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SkillsConnect</title>
    <link rel="stylesheet" href="style.css"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
</head>
<body>
    <div class="form-panel">
        
        <div class="form-card">
            <div class="form-logo-header">
                <img src="SkillsConnect Logo 2.PNG" alt="SkillsConnect Logo" class="form-panel-logo">
            </div>

            <div class="brand-content">
                <h1 class="brand-title">Welcome to SkillsConnect</h1>
                <p class="brand-tagline">Bridge the gap between raw potential and your next professional breakthrough.</p>
            </div>

            <div class="form-header">
                <h2 class="login-heading">Login</h2>
                <p class="signup-prompt">New here? <a href="signup-role-select.html">Create an account</a></p>
            </div>

            <p id="login-error-msg" class="error-banner" style="display:none;"></p>

            <form id="login-form">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input id="email" type="email" name="email" autocomplete="email" placeholder="name@company.com" required>
                </div>

                <div class="input-group">
                    <div class="label-row">
                        <label for="password">Password</label>
                        <a href="forgotPassword.html" class="forgot-link">Forgot password?</a>
                    </div>
                    <input id="password" type="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary">Sign In</button>

                <div class="form-divider">
                    <span>or continue with</span>
                </div>

                <button type="button" id="google-login-btn" class="btn-social">
                    <img src="google.svg" class="btn-icon" alt="Google">
                    Google
                </button>
            </form>
        </div>

    </div>

    <div id="google-password-modal">
        <div id="gpm-card">
            <h3>Confirm Password</h3>
            <p class="gpm-sub">Enter the security password you set during initial registration.</p>
            <div id="gpm-error"></div>
            
            <div class="input-group">
                <label for="gpm-password">Password</label>
                <input id="gpm-password" type="password" placeholder="Enter your password">
            </div>
            
            <div id="gpm-actions">
                <button id="gpm-cancel" type="button">Cancel</button>
                <button id="gpm-submit" type="button">Continue</button>
            </div>
        </div>
    </div>

    <div id="global-error"></div>

    <script type="module" src="login.js"></script>
    <script type="module" src="/login-email.js"></script>
</body>
</html>
