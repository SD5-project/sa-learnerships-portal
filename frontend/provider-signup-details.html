<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Sign Up — Step 2 | SkillsConnect</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="signup.css">
</head>
<body class="signup-page">
    <div class="signup-card">
        <img src="SkillsConnect Logo 2.PNG" class="signup-logo" alt="SkillsConnect">

        <div class="signup-step-indicator">
            <div class="step-dot completed"></div>
            <div class="step-dot completed"></div>
            <div class="step-dot active"></div>
        </div>

        <h2 class="signup-heading">Organisation details</h2>
        <p class="signup-subheading">Tell us about your company or training organisation</p>

        <div id="global-error" class="global-error"></div>

        <div class="signup-field">
            <label for="orgName">Company / organisation name</label>
            <input type="text" id="orgName" placeholder="e.g. Telkom SA Ltd" autocomplete="organization">
        </div>

        <div class="signup-field">
            <label for="phone">Organisation phone number</label>
            <div class="phone-input-group">
                <select id="areaCode">
                    <option value="+27">+27</option>
                    <option value="+1">+1</option>
                    <option value="+44">+44</option>
                    <option value="+91">+91</option>
                    <option value="+61">+61</option>
                </select>
                <input type="tel" id="phone" placeholder="115551234" autocomplete="tel-national">
            </div>
            <span class="field-error" id="phoneError"></span>
        </div>

        <div class="signup-actions">
            <a href="provider-signup-password.html" class="btn-back">← Back</a>
            <button class="btn-next" id="next-btn">Sign Up →</button>
        </div>

        <p class="back-to-login">Already have an account? <a href="index.html">Log in</a></p>
    </div>

    <script type="module" src="provider-signup-details.js"></script>
</body>
</html>
