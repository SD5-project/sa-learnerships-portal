<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Sign Up — Step 3 | SkillsConnect</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        /* ── SIGNUP PAGE SHELL ── */
        .signup-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            box-sizing: border-box;
            background-color: var(--bg-main);
        }

        /* ── CARD ── */
        .signup-card {
            width: 100%;
            max-width: 420px;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-soft);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3), 0 10px 10px -5px rgba(0,0,0,0.2);
            box-sizing: border-box;
        }

        /* ── LOGO ── */
        .signup-logo {
            height: 64px;
            width: auto;
            object-fit: contain;
            display: block;
            margin-bottom: 24px;
        }

        /* ── STEP INDICATOR ── */
        .step-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 28px;
        }

        .step-dot {
            height: 4px;
            border-radius: 2px;
            background: var(--border-soft);
            transition: all 0.25s ease;
            flex: 1;
        }
        .step-dot.active    { background: var(--accent-blue); flex: 2; }
        .step-dot.completed { background: rgba(56,189,248,0.35); }

        /* ── HEADINGS ── */
        .signup-heading {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 6px;
            letter-spacing: -0.02em;
        }

        .signup-subheading {
            font-size: 14px;
            color: var(--text-muted);
            margin: 0 0 28px;
            line-height: 1.5;
        }

        /* ── GLOBAL ERROR ── */
        .global-error {
            display: none;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .global-error:not(:empty) { display: block; }

        /* ── FORM FIELDS ── */
        .signup-field {
            display: flex;
            flex-direction: column;
            gap: 7px;
            margin-bottom: 20px;
        }

        .signup-field label {
            font-size: 13px;
            font-weight: 500;
            color: #cbd5e1;
        }

        .signup-field input {
            background-color: #0f172a;
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-main);
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        .signup-field input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
        }

        .field-error {
            font-size: 12px;
            color: #fca5a5;
            min-height: 16px;
            display: block;
        }

        /* ── PHONE GROUP ── */
        .phone-input-group {
            display: flex;
            gap: 8px;
        }

        .phone-input-group select {
            background-color: #0f172a;
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-main);
            border-radius: 8px;
            padding: 12px 10px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            width: 90px;
            flex-shrink: 0;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .phone-input-group select:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
        }

        .phone-input-group input {
            flex: 1;
            background-color: #0f172a;
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-main);
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        .phone-input-group input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
        }

        /* ── ACTIONS ── */
        .signup-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn-back {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-soft);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .btn-back:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }

        .btn-next {
            flex: 2;
            background-color: var(--accent-blue);
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s ease;
        }
        .btn-next:hover { background-color: var(--accent-hover); transform: translateY(-1px); }
        .btn-next:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* ── FOOTER LINK ── */
        .back-to-login {
            margin: 24px 0 0;
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
        }
        .back-to-login a {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }
        .back-to-login a:hover { color: var(--accent-hover); text-decoration: underline; }
    </style>
</head>
<body class="signup-page">
    <div class="signup-card">

        <img src="SkillsConnect Logo 2.PNG" class="signup-logo" alt="SkillsConnect">

        <!-- 4-step indicator (provider flow): step 3 active -->
        <div class="step-indicator">
            <div class="step-dot completed"></div>
            <div class="step-dot completed"></div>
            <div class="step-dot active"></div>
            <div class="step-dot"></div>
        </div>

        <h2 class="signup-heading">Organisation details</h2>
        <p class="signup-subheading">Tell us about your company or training organisation</p>

        <div id="global-error" class="global-error"></div>

        <div class="signup-field">
            <label for="orgName">Company / organisation name</label>
            <input type="text" id="orgName" placeholder="e.g. Telkom SA Ltd" autocomplete="organization">
        </div>

        <div class="signup-field">
            <label for="city">Location</label>
            <input type="text" id="city" placeholder="Start typing an address…" autocomplete="off">
            <span class="field-error" id="cityError"></span>
        </div>

        <div class="signup-field">
            <label for="phone">Organisation phone number</label>
            <div class="phone-input-group">
                <select id="areaCode">
                    <option value="+27">+27</option>
                    <option value="+1">+1</option>
                    <option value="+44">+44</option>
                    <option value="+91">+91</option>
                    <option value="+61">+61</option>
                </select>
                <input type="tel" id="phone" placeholder="115551234" autocomplete="tel-national">
            </div>
            <span class="field-error" id="phoneError"></span>
        </div>

        <div class="signup-actions">
            <a href="provider-signup-password.html" class="btn-back">← Back</a>
            <button class="btn-next" id="next-btn">Sign Up →</button>
        </div>

        <p class="back-to-login">Already have an account? <a href="index.html">Log in</a></p>
    </div>

    <script type="module" src="provider-signup-details.js"></script>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDHRk3kDwXc6__TDZIuGkQlQsEwCsK8mDc&libraries=places&callback=initPlaces" async defer></script>
    <script>
        window.initPlaces = function() {
            const input        = document.getElementById("city");
            const autocomplete = new google.maps.places.Autocomplete(input, {
                componentRestrictions: { country: "za" },
                fields: ["formatted_address", "geometry", "name"]
            });

            const style = document.createElement("style");
            style.textContent = `
                .pac-container { background:#f9f9f9; border:1.5px solid #ccc; border-radius:8px; margin-top:4px; font-family:inherit; }
                .pac-item { color:#333; border-top:1px solid #eee; padding:8px 14px; cursor:pointer; font-size:14px; }
                .pac-item:hover, .pac-item-selected { background:#f0f0f0; }
                .pac-item-query { color:#333; font-size:14px; }
                .pac-icon { display:none; }
            `;
            document.head.appendChild(style);

            autocomplete.addListener("place_changed", () => {
                const place = autocomplete.getPlace();
                if (place.formatted_address) input.value = place.formatted_address;
            });
        };
    </script>
</body>
</html>
