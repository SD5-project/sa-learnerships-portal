<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Sign Up — Step 2 | SkillsConnect</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="signup.css">
</head>
<body class="signup-page" data-role="provider">
    <div class="signup-card">
        <img src="SkillsConnect Logo 2.PNG" class="signup-logo" alt="SkillsConnect">

        <div class="signup-step-indicator">
            <div class="step-dot completed"></div>
            <div class="step-dot active"></div>
            <div class="step-dot"></div>
            <div class="step-dot"></div>
        </div>

        <h2 class="signup-heading">Create your password</h2>
        <p class="signup-subheading" id="page-subheading">
            Create a password so you can log in to SkillsConnect at any time.
        </p>

        <div id="global-error" class="global-error"></div>

        <div class="signup-field" id="email-field">
            <label for="email">Email address</label>
            <input type="email" id="email" autocomplete="email" placeholder="your@email.com">
            <span class="field-error" id="email-error"></span>
        </div>

        <div class="signup-field">
            <label for="password">Password</label>
            <input type="password" id="password" autocomplete="new-password" placeholder="At least 9 characters">
            <span class="field-error" id="password-error"></span>
        </div>

        <div class="signup-field">
            <label for="confirm-password">Confirm password</label>
            <input type="password" id="confirm-password" autocomplete="new-password" placeholder="Repeat your password">
            <span class="field-error" id="confirm-error"></span>
        </div>

        <div class="signup-actions">
            <a href="provider-signup-identity.html" class="btn-back">← Back</a>
            <button class="btn-next" id="next-btn">Next →</button>
        </div>

        <p class="back-to-login">Already have an account? <a href="index.html">Log in</a></p>
    </div>

    <script type="module" src="signup-password.js"></script>
</body>
</html>
