<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Sign Up — Portfolio | SkillsConnect</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        /* ── SIGNUP PAGE SHELL ── */
        .signup-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            box-sizing: border-box;
            background-color: var(--bg-main);
        }

        /* ── CARD ── */
        .signup-card {
            width: 100%;
            max-width: 460px;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-soft);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3), 0 10px 10px -5px rgba(0,0,0,0.2);
            box-sizing: border-box;
        }

        /* ── LOGO ── */
        .signup-logo {
            height: 64px;
            width: auto;
            object-fit: contain;
            display: block;
            margin-bottom: 24px;
        }

        /* ── STEP INDICATOR ── */
        .step-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 28px;
        }

        .step-dot {
            height: 4px;
            border-radius: 2px;
            background: var(--border-soft);
            transition: all 0.25s ease;
            flex: 1;
        }
        .step-dot.active    { background: var(--accent-blue); flex: 2; }
        .step-dot.completed { background: rgba(56,189,248,0.35); }

        /* ── HEADINGS ── */
        .signup-heading {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 6px;
            letter-spacing: -0.02em;
        }

        .signup-subheading {
            font-size: 14px;
            color: var(--text-muted);
            margin: 0 0 28px;
            line-height: 1.5;
        }

        /* ── GLOBAL ERROR ── */
        .global-error {
            display: none;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .global-error:not(:empty) { display: block; }

        /* ── PORTFOLIO OPTIONS ── */
        .portfolio-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
        }

        .portfolio-option {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            background-color: rgba(15,23,42,0.6);
            border: 1px solid var(--border-soft);
            border-radius: 12px;
            padding: 18px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .portfolio-option:hover {
            border-color: rgba(56,189,248,0.3);
            background-color: rgba(56,189,248,0.04);
        }

        .portfolio-option input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            min-width: 18px;
            border: 1.5px solid rgba(255,255,255,0.2);
            border-radius: 5px;
            background-color: #0f172a;
            margin-top: 2px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            flex-shrink: 0;
        }

        .portfolio-option input[type="checkbox"]:checked {
            background-color: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .portfolio-option input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            left: 4px;
            top: 1px;
            width: 5px;
            height: 9px;
            border: 2px solid #0f172a;
            border-top: none;
            border-left: none;
            transform: rotate(45deg);
        }

        .portfolio-option.selected {
            border-color: rgba(56,189,248,0.4);
            background-color: rgba(56,189,248,0.07);
        }

        .portfolio-option-text {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .portfolio-option-text strong {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
        }

        .portfolio-option-text span {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* ── ACTIONS ROW ── */
        .signup-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-back {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-soft);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-back:hover {
            background-color: rgba(255,255,255,0.05);
            color: var(--text-main);
            border-color: rgba(255,255,255,0.15);
        }

        .btn-next {
            flex: 2;
            background-color: var(--accent-blue);
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .btn-next:hover    { background-color: var(--accent-hover); transform: translateY(-1px); }
        .btn-next:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* ── FOOTER LINK ── */
        .back-to-login {
            margin: 24px 0 0;
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
        }

        .back-to-login a {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .back-to-login a:hover { color: var(--accent-hover); text-decoration: underline; }
    </style>
</head>
<body class="signup-page">
    <div class="signup-card">

        <img src="SkillsConnect Logo 2.PNG" class="signup-logo" alt="SkillsConnect">

        <!-- 4-step indicator: step 3 active -->
        <div class="step-indicator">
            <div class="step-dot completed"></div>
            <div class="step-dot completed"></div>
            <div class="step-dot active"></div>
            <div class="step-dot"></div>
        </div>

        <h2 class="signup-heading">Portfolios offered</h2>
        <p class="signup-subheading">Select the type(s) of opportunities your organisation offers. You must select at least one.</p>

        <div id="global-error" class="global-error"></div>

        <div class="portfolio-options">
            <label class="portfolio-option" id="opt-internships">
                <input type="checkbox" id="chk-internships" value="internships">
                <div class="portfolio-option-text">
                    <strong>Internships</strong>
                    <span>Work experience placements, typically for students or recent graduates.</span>
                </div>
            </label>

            <label class="portfolio-option" id="opt-apprenticeships">
                <input type="checkbox" id="chk-apprenticeships" value="apprenticeships">
                <div class="portfolio-option-text">
                    <strong>Apprenticeships</strong>
                    <span>Structured programmes combining on-the-job training with formal instruction.</span>
                </div>
            </label>

            <label class="portfolio-option" id="opt-learnerships">
                <input type="checkbox" id="chk-learnerships" value="learnerships">
                <div class="portfolio-option-text">
                    <strong>Learnerships</strong>
                    <span>SETA-accredited programmes leading to a registered NQF qualification.</span>
                </div>
            </label>
        </div>

        <div class="signup-actions">
            <a href="provider-signup-details.html" class="btn-back">← Back</a>
            <button class="btn-next" id="next-btn">Next →</button>
        </div>

        <p class="back-to-login">Already have an account? <a href="index.html">Log in</a></p>
    </div>

    <script>
        // Sync selected class with checkbox state for border highlight
        document.querySelectorAll('.portfolio-option').forEach(label => {
            const checkbox = label.querySelector('input[type="checkbox"]');

            checkbox.addEventListener('change', () => {
                label.classList.toggle('selected', checkbox.checked);
            });
        });
    </script>

    <script type="module" src="provider-signup-portfolio.js"></script>
</body>
</html>
