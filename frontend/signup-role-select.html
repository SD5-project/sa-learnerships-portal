<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | SkillsConnect</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="signup.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
</head>
<body>
    <div class="form-panel">
        
        <div class="form-card">
            <div class="form-logo-header">
                <img src="SkillsConnect Logo 2.PNG" alt="SkillsConnect Logo" class="form-panel-logo">
            </div>

            <div class="brand-content">
                <h1 class="brand-title">Join SkillsConnect</h1>
                <p class="brand-tagline">How will you be using the platform?</p>
            </div>

            <div class="role-cards">
                <a href="#" class="role-card" id="applicant-card">
                    <span class="role-card-icon">🎓</span>
                    <div class="role-card-title">Applicant</div>
                    <p class="role-card-desc">Looking for learnerships, internships, or apprenticeships</p>
                </a>
                <a href="#" class="role-card" id="provider-card">
                    <span class="role-card-icon">🏢</span>
                    <div class="role-card-title">Provider</div>
                    <p class="role-card-desc">Employer or training organisation offering opportunities</p>
                </a>
            </div>

            <div class="form-header" style="margin-bottom: 0; margin-top: 24px;">
                <p class="signup-prompt" style="text-align: center;">
                    Already have an account? <a href="index.html">Log in</a>
                </p>
            </div>
        </div>

    </div>

    <script type="module">
        import { SignupBuilder } from './SignupBuilder.js';

        document.getElementById('applicant-card').addEventListener('click', e => {
            e.preventDefault();
            SignupBuilder.start('applicant');
            window.location.href = 'applicant-signup-identity.html';
        });

        document.getElementById('provider-card').addEventListener('click', e => {
            e.preventDefault();
            SignupBuilder.start('provider');
            window.location.href = 'provider-signup-identity.html';
        });
    </script>
</body>
</html>
